name: Publish

# Two ways to release, both under THIS filename on purpose — npm OIDC trusted
# publishing is bound to `publish.yml`, so all publishing must originate here:
#
#   • auto-release  — every merge to main: verify → bump patch → tag → publish.
#   • tag path      — a human-pushed `v*` tag (or workflow_dispatch on a tag):
#                     verify (with tag/version lock) → publish that exact version.
#
# The auto-release version-bump commit + tag are pushed with the default
# GITHUB_TOKEN, which by design does NOT re-trigger workflows — so it never loops
# (and a GITHUB_TOKEN tag push wouldn't fire the tag path either).

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── auto-release on merge to main ─────────────────────────────────────────
  auto-release:
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version-bump commit + tag
      id-token: write # OIDC trusted publish + Sigstore provenance
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Verify BEFORE bumping, so a red main never gets a version/tag.
      - name: Typecheck
        run: pnpm run typecheck
      - name: Test
        run: pnpm run test
      - name: Build
        run: pnpm run build

      # Pinned (not @latest): npm 12.0.0 (2026-07-08) broke `--provenance` with
      # "MODULE_NOT_FOUND: Cannot find module 'sigstore'". 11.18.0 is the last
      # known-good release (>= 11.5.1 for OIDC). Revisit once a fixed 12.x ships.
      - run: npm install -g npm@11.18.0

      - name: Bump patch, commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore(release): %s [skip release]"
          git push origin HEAD:main --follow-tags

      - name: Publish to npm (skip if already published)
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already on registry; skipping publish"
          else
            npm publish --provenance --access public || {
              echo "::error::npm publish failed. Verify the trusted publisher entry exists at https://www.npmjs.com/package/@tangle-network/agent-app/access (workflow=publish.yml)."
              exit 1
            }
          fi

  # ── manual / human-pushed tag path ────────────────────────────────────────
  verify:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      # tsup builds .d.ts for ~38 entry points in a worker thread (the `prepare`
      # script fires during `pnpm install`, then again in the Build step). That
      # worker needs ~4.7GB of heap; the default worker limit OOMs it with
      # ERR_WORKER_OUT_OF_MEMORY on the hosted runner. The worker inherits
      # NODE_OPTIONS, so a job-level heap covers install (prepare), test, and
      # build in one place.
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Test
        run: pnpm run test
      - name: Build
        run: pnpm run build
      - name: Verify tag/version lock
        run: |
          NPM_VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_VERSION" != "$NPM_VERSION" ]; then
              echo "::error::Tag/version mismatch: tag=$TAG_VERSION package=$NPM_VERSION."
              exit 1
            fi
          fi
          echo "Version locked: $NPM_VERSION"

  publish-npm:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      # Same DTS-worker heap need: this job runs `pnpm install` (prepare → tsup)
      # and `pnpm run build` before publishing.
      NODE_OPTIONS: --max-old-space-size=6144
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # OIDC trusted publishing needs npm CLI >= 11.5.1; Node 22 ships npm 10.x,
      # which sends the publish PUT UNAUTHENTICATED → registry 404. Upgrade first.
      # We publish with `npm publish` (not `pnpm publish`): npm performs the OIDC
      # id-token → registry-token exchange the trusted-publisher entry expects.
      # Safe here because agent-app has no `workspace:` protocol deps to leak
      # (peers are plain version ranges). The package ships only ./dist.
      # Pinned (not @latest): npm 12.0.0 (2026-07-08) broke `--provenance`
      # (sigstore MODULE_NOT_FOUND). 11.18.0 is the last known-good. Revisit on 12.x fix.
      - run: npm install -g npm@11.18.0
      - run: npm --version

      # Idempotent: re-running a tag whose npm version is already published must
      # not fail. Auth is npm OIDC trusted publishing (no NPM_TOKEN) — the
      # id-token: write permission lets npm mint the short-lived OIDC token it
      # exchanges for publish rights + Sigstore provenance.
      - name: Publish to npm (skip if already published)
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already on registry; skipping publish"
          else
            npm publish --provenance --access public || {
              echo "::error::npm publish failed. Verify the trusted publisher entry exists at https://www.npmjs.com/package/@tangle-network/agent-app/access (workflow=publish.yml)."
              exit 1
            }
          fi
